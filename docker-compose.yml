services:
  dedicated-server:
    build:
      context: .
      dockerfile: Dockerfile.dedicated-server
    image: jdemic-dedicated-server:dev
    environment:
      JDEMIC_SERVER_PORT: "9000"
      JDEMIC_STATUS_ENABLED: "true"
      JDEMIC_STATUS_HOST: "0.0.0.0"
      JDEMIC_STATUS_PORT: "8080"
      JDEMIC_OPEN_BROWSER: "false"
    ports:
      - "9000:9000"
      - "8080:8080"
