name: CD - Automated Release

on:
  push:
    branches:
      - main 

jobs:
  release:
    runs-on: ubuntu-latest
    # Grant the bot permission to write/create a public Release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package with Maven
        # Create the .jar file but skip tests (they already passed in the PR)
        run: mvn clean package -DskipTests

      - name: Generate Version Tag
      id: versioning
      run: |# Generate a unique version based on run number and attempt (e.g., v1.0.42.1)
        VERSION="v1.0.${{ github.run_number }}.${{ github.run_attempt }}"
        echo "RELEASE_TAG=$VERSION" >> $GITHUB_ENV
        echo "Created version tag: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body: |
            ### New version generated automatically!
            The code on main has been compiled successfully.
            Download the .jar file from the Assets section below to run the application.
          draft: false
          prerelease: false
          files: target/*.jar  # Automatically fetches the generated executable
